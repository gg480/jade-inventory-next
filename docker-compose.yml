version: "3.8"

services:
  jade-inventory:
    image: gg480/jade-inventory-next:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jade-inventory
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./db/custom.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    volumes:
      # Persist database across container restarts
      - jade-db:/app/db
      # Persist uploaded images
      - jade-uploads:/app/upload
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/stats/quick"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  jade-db:
    driver: local
  jade-uploads:
    driver: local
